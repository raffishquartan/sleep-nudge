    year: 2015
    published_at: 2015-06
    verified_at: '2026-05-02T20:40:00+01:00'
    verified_status: 200
    supporting_passage: Nights of shorter sleep duration and time in bed, increased
      fragmentation, and less efficient sleep (relative to one's own mean) were followed
      by days of greater pain severity. A 30-minute increase in total sleep time is
      associated with lower pain severity the next day (a decrease of 0.30 points
