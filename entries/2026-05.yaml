    and PPAR-alpha-driven gene expression. In adiponectin-knockout (APN-/-) versus
    wild-type C57BL/6J mice, glucose tolerance was indistinguishable at one circadian
    phase but significantly worse at the opposite phase: APN-/- mice had significantly
