    genes (Mtp, ApoB100, Insig2a) failed to peak at CT22 in the APN-/- arm (Wada et
    al. 2022). VLDL-triglyceride secretion was time-dependent only in wild-type mice.
    Mechanistically, the adiponectin rhythm gates AMPK activation, fatty-acid oxidation,
    and the partitioning of hepatic energy substrates - this is metabolic flexibility,
    the ability to switch between fuel sources cleanly. Sleep restriction and circadian
    disruption both blunt the adiponectin rhythm in humans, contributing to the metabolic-syndrome
    phenotype.


    Plain language: an under-appreciated reason regular sleep timing protects you
    from type 2 diabetes is that the hormone responsible for your liver and muscle
    being good at switching fuels has its own clock. Late or irregular nights flatten
    that clock and leave the switching machinery permanently in the worse mode.


