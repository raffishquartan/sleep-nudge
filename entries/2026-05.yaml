  body: 'In sickle cell disease the relationship between sleep and pain is not abstract;
    it can be measured night by night and day by day. A three-month within-person
    diary study of 75 adults with SCD (4,400+ paired sleep and pain entries) found
    that nights of shorter total sleep time, less efficient sleep, and more wake-after-sleep-onset
    were followed by days of higher clinical pain (Moscou-Jackson et al. 2015). Each
    30-minute increase in total sleep time corresponded to a 0.30-point lower pain
    severity the next day on a 0-100 scale; each 30-minute decrease in wake-after-sleep-onset
    corresponded to a 0.60-point reduction (P < 0.001 across measures). Two mechanisms
    are credible. First, sleep fragmentation suppresses descending endogenous opioid
    pain modulation, an effect already demonstrated in healthy adults and a strong
    candidate pathway in SCD. Second, fragmented short sleep raises systemic inflammatory
    activity, which compounds vaso-occlusive risk and lowers the hyperalgesic threshold.


    Plain language: if you live with SCD, the night before a hard day matters mechanically,
    not just emotionally. The intervention with the largest evidence base for tomorrow''s
    pain is consolidated sleep tonight. Even an extra 30 minutes is measurable.


    References

    Moscou-Jackson, G., Finan, P.H., Campbell, C.M., Smyth, J.M., Haythornthwaite,
    J.A. (2015). The Effect of Sleep Continuity on Pain in Adults with Sickle Cell
    Disease. The Journal of Pain, 16(6), 587-593. https://pmc.ncbi.nlm.nih.gov/articles/PMC4456237/


    ---

