  body: 'Sleep is when the brain rebuilds its insulation. In adult mice, oligodendrocyte
    precursor cell (OPC) proliferation roughly doubles during sleep and the rate correlates
    specifically with REM time (r = 0.79, P = 0.007), while OPC differentiation -
    the conversion of precursor cells into mature myelinating oligodendrocytes - shifts
    toward the wake phase (Bellesi et al. 2013). The transcriptional split is sharp:
    genes for phospholipid synthesis, myelination and OPC proliferation (Yap1, Mxd3,
    Nrg2) are preferentially transcribed in sleep, while apoptosis, cellular-stress
    and differentiation genes (YY1, Sox17) are enriched in wake. Two opposing neuromodulators
    set the rhythm: glutamatergic synaptic activity is higher in wake and inhibits
    OPC proliferation, and adenosine - which builds during wake and falls during sleep
    - similarly stops proliferation and pushes differentiation. The functional consequence
    is that the white-matter scaffolding that supports faster, more reliable signal
    conduction depends on a phasic alternation of sleep-restorative phases and active
    wake; chronic sleep restriction biases the cycle and reduces the pool of new myelin-capable
    cells.


