  body: 'Friday sleep nudge - hormonal


    Topic: Cortisol slope flattening and chronic stress sleep loss


    Scientific

    A healthy diurnal cortisol curve has a sharp morning peak (the cortisol awakening
    response, ~30-45 min after waking) and a steep decline across the day, reaching
    a nadir near sleep onset. Chronic psychosocial stress - and the truncated, fragmented
    sleep that travels with it - flattens that slope in two stereotyped ways: a lower-than-typical
    morning peak with little daytime decline, or an elevated late-afternoon and evening
    level that erases the descent. Adam et al. (2017), in a meta-analysis of 80 studies,
    found flatter slopes were associated with poorer outcomes in 10 of 12 health subtypes
    examined (mean r = .147, 95% CI .112-.183), with the largest effects on immune/inflammatory
    markers. Mechanistically, repeated cortisol elevations break down the glucocorticoid-receptor-mediated
    negative feedback that normally damps HPA output; deep slow-wave sleep is the
    principal nightly inhibitor of CRH/ACTH release, so when SWS shrinks (as in insomnia,
    which raises 24-hour ACTH and cortisol), the brake is released. The flattened
    slope is therefore both a consequence of poor sleep and a driver of further sleep
    disruption, depression, visceral adiposity, and immune dysregulation - a self-reinforcing
    loop.


    Plain language

    Your cortisol should spike in the morning and drop steeply by night. Chronic stress
    and short sleep flatten that curve, and the flatter your curve, the worse your
    inflammation, mood, and metabolism. Deep sleep tonight is what resets the slope.


    References

    - Adam EK, Quinn ME, Tavernier R, McQuillan MT, Dahlke KA, Gilbert KE (2017).
    Diurnal Cortisol Slopes and Mental and Physical Health Outcomes: A Systematic
    Review and Meta-analysis. Psychoneuroendocrinology. https://pmc.ncbi.nlm.nih.gov/articles/PMC5568897/


    ---'
