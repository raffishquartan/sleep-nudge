    extended time in bed to a 10-hour target for five to seven weeks after a 2-4 week
    habitual baseline; actigraphy-confirmed sleep duration rose by 110.9 +/- 79.7
    minutes per night (P < 0.001). Free-throw percentage rose by 9% (7.9 to 8.8 out
    of 10) and 3-point percentage by 9.2% (10.2 to 11.6 out of 15), both P < 0.001
    (Mah et al. 2011). 282-foot sprint times fell from 16.2 to 15.5 seconds. The authors
    attribute the gains to faster psychomotor vigilance, lower fatigue and improved
    mood, but the size of the accuracy effect specifically suggests procedural-motor
    consolidation is also at work - the cerebellar and motor-cortical circuits that
    fine-tune ballistic movements rehearse and refine themselves during sleep. Comparable
    serve-accuracy gains have been shown in collegiate tennis players given two extra
    hours nightly.


    Plain language: if you compete in a sport where one or two percentage points of
    accuracy decide games, an extra ninety minutes of nightly sleep over a few weeks
    is on the same scale as serious training adjustments. Tonight does not deliver
    the gain on its own, but it is one of the deposits.


    References

