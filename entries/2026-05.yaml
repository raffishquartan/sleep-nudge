  body: 'Sunday sleep nudge - neurological


    Topic: Amyloid-beta production and clearance kinetics across wake and sleep


    Scientific

    Amyloid-beta (Abeta) - the peptide whose aggregation defines Alzheimer''s pathology
    - rises in CSF during wake and falls during sleep on a daily oscillation of roughly
    25-30%. Lucey et al. (2017) used stable-isotope-labelling kinetics (SILK) combined
    with mass spectrometry to disentangle why: they simultaneously measured absolute
    Abeta concentration and fractional turnover, production, and exchange rates across
    the wake-sleep cycle in cognitively normal adults. Two mechanisms drive the diurnal
    pattern. First, neuronal activity is higher during wake, so Abeta production rises
    with synaptic firing; conversely, neuronal activity falls during sleep, particularly
    during NREM. Second, ISF bulk flow (the glymphatic clearance route) increases
    during sleep, raising the fractional clearance rate of Abeta from brain interstitium
    to CSF and onward to perivenous drainage. A separate study by the same group showed
    acute sleep deprivation raised overnight Abeta-38, Abeta-40, and Abeta-42 by 25-30%,
    driven primarily by increased production rather than reduced clearance. In amyloid-positive
    individuals, plaque deposition itself acts as a sink for Abeta-42 - flattening
    its day/night amplitude - so a damaged sleep architecture and an amyloid-laden
    brain feed each other in a feed-forward loop.


    Plain language

    Every hour you stay awake, your brain makes more amyloid - the protein that builds
    Alzheimer''s plaques. Sleep is when production drops AND clearance kicks in. One
    night of skimped sleep raises overnight amyloid by ~30%. This is not a ''someday''
    problem; it accumulates nightly.


    References

    - Lucey BP, Mawuenyega KG, Patterson BW, Elbert DL, Ovod V, Kasten T, Morris JC,
    Bateman RJ (2017). Associations Between beta-Amyloid Kinetics and the beta-Amyloid
    Diurnal Pattern in the Central Nervous System. JAMA Neurology. https://pmc.ncbi.nlm.nih.gov/articles/PMC5305432/


    ---'
