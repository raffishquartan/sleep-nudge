  body: 'Wednesday sleep nudge - neurological


    Topic: CSF-ISF exchange amplitude during NREM slow-wave sleep


    Scientific

    During NREM sleep, cerebrospinal fluid (CSF) flow through the brain''s perivascular
    spaces shifts from a small respiratory-driven rhythm (~0.25 Hz during wake) to
    large-amplitude oscillations centred near 0.05 Hz - waves of CSF inflow arriving
    roughly every 20 seconds, with the CSF signal showing approximately a 5.52 dB
    increase at this frequency relative to wake. These CSF pulses are tightly coupled
    to the slow-delta (0.2-4 Hz) EEG oscillations characteristic of NREM3: neural
    slow waves precede the CSF wave by about 6.4 seconds, and the resulting CSF inflow
    drives bulk exchange with interstitial fluid (ISF) that flushes neurotoxic proteins
    (including amyloid-beta and tau) out via perivenous pathways. Recent work (Nair
    et al. 2025) shows that in deep NREM3, cerebral blood volume amplitude actually
    decreases toward wake-like levels while CSF amplitude stays significantly elevated
    - a desynchronization that the authors attribute to reduced brain tissue resistance,
    allowing sustained CSF inflow without proportional vascular pulsation. Sleeping
    less, or sleeping more shallowly, shrinks the time window in which this high-amplitude
    clearance can occur.


    Plain language

    Deep sleep is when your brain rinses itself. Big slow waves of CSF wash through
    every ~20 seconds, carrying away the metabolic waste your neurons made during
    the day. Skip that, and the rinse cycle does not run.


    References

    - Nair VV, Kish BR, Oshima H, Wright AM, Wen Q, Schwichtenberg AJ, Tong Y (2025).
    Amplitude fluctuations of cerebrovascular oscillations and CSF movement desynchronize
    during NREM3 sleep. Journal of Cerebral Blood Flow & Metabolism. https://pmc.ncbi.nlm.nih.gov/articles/PMC12081394/


    ---'
