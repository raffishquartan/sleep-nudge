  subject: '[Cld] Sleep Nudge - 2026-05-06 - neurological: Cortical excitability rebound
    during sleep deprivation'
  body: 'Wakefulness drives the cortex toward saturation. In a 20-person crossover
    study using transcranial magnetic stimulation, one night of total sleep deprivation
    lowered the stimulation intensity needed to evoke a fixed motor-evoked potential
    amplitude (t19 = -2.46, P = 0.023), meaning the corticospinal pathway is more
    excitable after a sleepless night, not less (Kuhn et al. 2016). At the same time,
    the capacity to induce long-term-potentiation-like plasticity through paired associative
    stimulation collapsed (eta-p^2 = 0.283; P = 0.013), and EEG theta power rose sharply
    (P < 0.001). The framework is the synaptic homeostasis hypothesis: every hour
    of wake net-strengthens cortical synapses, and sleep is the period that renormalises
    them. Strip the renormalisation and you are left with synapses that fire too easily
    but cannot encode new learning - a high-noise, low-signal state. This is why one
    bad night blunts learning the next day even when subjective alertness has caffeinated
    itself back into shape.


    Plain language: a short night doesn''t make your brain quiet, it makes it noisier
    and less able to lock in new memories. If you are about to learn or retain something
    tomorrow, the cheapest intervention is being asleep within the next hour. Caffeine
    restores alertness but not the plasticity capacity that was used up.


    References

    Kuhn, M., Wolf, E., Maier, J.G., et al. (2016). Sleep recalibrates homeostatic
    and associative synaptic plasticity in the human cortex. Nature Communications,
    7, 12455. https://pmc.ncbi.nlm.nih.gov/articles/PMC4996971/


    ---

    '
  references:
  - url: https://pmc.ncbi.nlm.nih.gov/articles/PMC4996971/
    title: Sleep recalibrates homeostatic and associative synaptic plasticity in the
      human cortex
    authors: Kuhn M, Wolf E, Maier JG, et al.
    year: 2016
    published_at: 2016-08
    verified_at: '2026-05-02T20:38:00+01:00'
