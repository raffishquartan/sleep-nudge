  body: 'Thursday sleep nudge - pain


    Topic: Postoperative pain intensity and pre-operative sleep


    Scientific

    The nights before surgery may be the single most modifiable predictor of how much
    your operation will hurt. In a prospective study of adults undergoing open-heart
    valve surgery, Zhang et al. (2020) found that preoperative poor sleep quality
    (Pittsburgh Sleep Quality Index >5) independently raised the risk of postoperative
    hyperalgesia by 2.66-fold (adjusted OR 2.66; 95% CI 1.31-5.39, p=0.007), with
    an even stronger 3.40-fold risk in nonsmoking patients. The mechanism stacks several
    pathways: total sleep deprivation lowers pain thresholds, impairs descending conditioned
    pain modulation, and facilitates temporal summation of nociceptive input - meaning
    the same surgical insult is amplified as it ascends the neuraxis. Sleep loss also
    drives systemic and central inflammation (IL-6, TNF-alpha, microglial priming)
    that sensitises peripheral and dorsal-horn nociceptors, while elevated adenosine
    signalling appears to upshift pain sensitivity directly. Net effect: a poor pre-op
    sleeper arrives at the table with a hyperalgesic, pro-inflammatory nervous system,
    and predictably leaves needing more opioid for the same operation.


    Plain language

    If you have surgery coming up, the sleep you get in the days before it changes
    how badly the wound will hurt afterwards. Poor sleepers in this study were 2-3x
    more likely to develop hyperalgesia. Tonight''s sleep is part of your pre-op prep.


    References

    - Zhang Z, Wang H, Wang Y, Luo Q, Yuan S, Yan F (2020). Risk of Postoperative
    Hyperalgesia in Adult Patients with Preoperative Poor Sleep Quality Undergoing
    Open-heart Valve Surgery. Journal of Pain Research. https://pmc.ncbi.nlm.nih.gov/articles/PMC7568632/


    ---'
  references:
  - url: https://pmc.ncbi.nlm.nih.gov/articles/PMC7568632/
