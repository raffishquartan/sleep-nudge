  body: 'Chronic circadian disruption is not just an insulin-sensitivity story; it
    directly degrades the pancreatic beta-cell itself. In diabetes-prone HIP rats,
    ten weeks of either constant light or repeated six-hour light advances every three
    days produced ~40% loss of beta-cell mass and ~65% reduction in glucose-stimulated
    insulin secretion versus a normal 12:12 light-dark cycle (Gale et al. 2011). The
    proximal mechanism is desynchronisation between the central pacemaker in the suprachiasmatic
    nucleus and the peripheral clock inside the beta-cell, compounded by disrupted
    melatonin signalling at the MTNR1B receptor (a locus already implicated in human
    hyperglycaemia GWAS) and accelerated beta-cell apoptosis driven by islet-amyloid-induced
    ER stress. Acute (3-day) misalignment in healthy young humans does not yet measurably
    impair early-phase insulin (Qian et al. 2018), so this is specifically a *chronic*
    exposure phenotype - the kind of misalignment built up by months of habitual late-night
    onsets and irregular wake times.


    Plain language: short bursts of jet-lag-like sleep are recoverable, but months
    of misaligned sleep timing kills beta cells in animal models. If you have a family
    history of type 2 diabetes, going to bed at the same time on weekdays and weekends
    is one of the cheapest hedges you can buy. Tonight is one tally mark in either
    direction.


    References

    Gale, J.E., Cox, H.I., Qian, J., Block, G.D., Colwell, C.S., Matveyenko, A.V.
