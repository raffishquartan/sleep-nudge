    Scientific section

    Flow-mediated dilation (FMD) is the brachial-artery diameter expansion produced
    when shear stress triggers endothelial nitric oxide synthase (eNOS) to release
    NO into vascular smooth muscle, causing relaxation. Cooper et al. (2014) measured
    FMD by ultrasound and overnight polysomnography in 100 adults and found that diminished
    FMD tracked both subjective sleep complaints and objective sleep architecture:
    lower FMD was associated with poorer PSQI global scores (beta = -0.22) and with
    reduced %REM sleep (beta = 0.25) plus longer REM latency (beta = -0.20), all p
    < 0.05. The mechanistic link is that brain NO production helps gate the descent
    into REM and slow-wave sleep, while peripheral NO from eNOS produces vasodilation;
    both pools depend on overlapping arginine substrate, BH4 cofactor, and oxidative-stress-sensitive
    coupling pathways. When sleep is curtailed, eNOS uncoupling and elevated asymmetric
    dimethylarginine reduce NO bioavailability, the artery loses its relaxation reserve,
    and this shows up as a smaller FMD response the next morning.


    Plain-language section

    Your blood vessels need a chemical called nitric oxide to relax properly. Deep
    and REM sleep help your body make and use it well. If you cut sleep short tonight,
    the lining of your arteries will be measurably stiffer tomorrow. Going to bed
    now is a direct investment in tomorrow''s vascular function.


