  body: 'Therapy outcomes for depression and concurrent insomnia treatment


    --- Scientific section ---


    Depression and insomnia co-occur in roughly 75-90% of depressed patients, and
    converging trial evidence shows treating both concurrently produces better outcomes
    than treating depression alone. Asarnow''s review (2019) reports that adding cognitive
    behavioural therapy for insomnia (CBT-I) to standard antidepressant management
    roughly doubles antidepressant treatment response rates and reduces suicidality
    by approximately half. In one pilot trial, MDD remission rose from 33% with escitalopram
    plus a control therapy to 62% with escitalopram plus CBT-I. Mechanistically, the
    hypothalamic-pituitary-adrenal (HPA) axis is a leading shared substrate: chronic
    stress and disturbed sleep both produce sustained cortisol elevation, blunted
    morning rise, and impaired negative feedback, which feed forward into hippocampal
    volume loss, prefrontal hypoactivity, and amygdala hyper-reactivity - the same
    circuitry implicated in depressive cognition. Crucially, mediation analyses show
    that improvement in insomnia symptoms statistically precedes and mediates depression
    remission, not the reverse - so sleep is acting as an active lever, not a passive
    marker.


