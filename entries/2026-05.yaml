  body: 'Falling asleep is a controlled autonomic manoeuvre - parasympathetic dominance
    has to take over from sympathetic dominance over the first few minutes of sleep
    onset, and the success of that handover sets the cardiovascular load through the
    entire night. Heart rate variability (HRV), particularly the high-frequency /
    respiratory-sinus-arrhythmia component, indexes vagal tone in real time. In a
    cross-sectional study of 222 mothers (125 with chronic caregiving stressors, 97
    without), individuals with lower resting HRV were more likely to report poorer
    sleep quality, and lower HRV correlated with higher blood pressure and cortisol
    - a hyperarousal phenotype that prevents the normal sleep-onset autonomic shift
    (da Estrela et al. 2020). Mechanistically, HRV is regulated by vagal afferent
    input integrated through prefrontal-amygdala-brainstem circuits that gate parasympathetic
    output to the sinoatrial node; chronic stress weakens this gating, leaves sympathetic
    tone elevated at bedtime, and perpetuates the cardiovascular reactivity that elevates
    the morning surge.


    Plain language: a calmer mind at bedtime is a slower, more variable heart, which
    is what your sleep-onset autonomic shift needs. If you''re under chronic stress,
    the few minutes before lights-out matter more than the same minutes earlier in
    the day - they decide what your heart does for the next eight hours.


