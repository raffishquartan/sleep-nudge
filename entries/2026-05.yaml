  body: '## Why this matters tonight


    Sleep is a uniquely anabolic window for skeletal muscle. While you lie still,
    fractional synthetic rate (FSR) of both myofibrillar (contractile) and mitochondrial
    (energy-producing) protein fractions runs steadily, fed by amino acids slowly
    released from the gut and from intramuscular pools. The overnight rise in growth
    hormone during slow-wave sleep, plus the relative drop in cortisol early in the
    night, creates the hormonal milieu that favours net protein accretion. If you
    cut sleep short you compress this window and you also raise cortisol and lower
    testosterone the next day, biasing the balance back towards proteolysis.


    A randomised controlled trial in trained men by Trommelen et al. (2023) measured
    overnight FSR using L-[1-13C]-phenylalanine infusion after evening endurance exercise.
    Mitochondrial protein synthesis rates rose from 0.067 ± 0.016 %/h on placebo to
    0.092 ± 0.020 %/h with whey protein - a 37 percent increase. Myofibrillar FSR
    rose from 0.047 ± 0.011 to 0.064 ± 0.018 %/h, a 35 percent increase. Crucially
    these gains accrue across the full sleep period; truncating sleep truncates the
    integral. A separate trial (Saner 2020) showed that five nights of sleep restricted
    to 4 hours dropped 24-hour myofibrillar FSR by 18 percent versus a 9-hour control,
    even with high-intensity exercise as a counter-stimulus.


    ## Plain language


    Going to bed now is literally feeding your muscles. The longer you sleep, the
    longer your body spends building new contractile and mitochondrial protein. Cutting
    sleep short truncates that window and tilts you towards muscle breakdown the next
    day.


    ## References


    - Trommelen J, Holwerda AM, Pinckaers PJM, van Loon LJC (2023). Pre-sleep Protein
    Ingestion Increases Mitochondrial Protein Synthesis Rates During Overnight Recovery
    from Endurance Exercise: A Randomized Controlled Trial. Sports Medicine. https://pmc.ncbi.nlm.nih.gov/articles/PMC10289916/

    - Saner NJ et al. (2020). The effect of sleep restriction, with or without high-intensity
    interval exercise, on myofibrillar protein synthesis in healthy young men. Journal
    of Physiology. https://pmc.ncbi.nlm.nih.gov/articles/PMC7217042/


    ---'
