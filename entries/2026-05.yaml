  body: 'Pulmonary hypertension is a recognised complication of obstructive sleep
    apnoea, with prevalence estimates clustering around 20% across the OSA population
    (range 17-70% across cohorts). The mechanism is built breath-by-breath, all night.
    Each apnoeic event produces intermittent hypoxia and hypercapnia, which trigger
    hypoxic pulmonary vasoconstriction and reduce nitric oxide bioavailability via
    NADPH-oxidase-driven oxidative stress, while endothelin-1 rises and inhibits eNOS-mediated
    vasodilation (Shah et al. 2021). Over months and years this drives pulmonary vascular
    smooth-muscle proliferation and remodelling. Untreated, mean pulmonary artery
    systolic pressure runs about 6 mmHg higher in OSA patients than controls (29.8
    +/- 8.8 vs 23.4 +/- 4.1 mmHg in Arias et al.); CPAP brings that pressure down
    significantly (24.0 +/- 5.8 mmHg post-treatment, P < 0.0001), and reduces total
    pulmonary vascular resistance. Compounding this, longstanding LV diastolic dysfunction
    from the same underlying disease raises pulmonary venous pressures, layering a
    second mechanism for the PH progression.


    Plain language: snoring loudly with witnessed pauses is not a quirk - it is a
    stress test for the right side of your heart that runs every night. If apnoea
    is on the table, getting a sleep study and starting CPAP if indicated is one of
    the few interventions that demonstrably reverses early pulmonary vascular damage.
    Tonight matters less than the cumulative dose; the cumulative dose is what gets
    diagnosed.


    References

    Shah, F.A., Moronta, S., Braford, M., Greene, N. (2021). Obstructive Sleep Apnea
    and Pulmonary Hypertension: A Review of Literature. Cureus, 13(4), e14575. https://pmc.ncbi.nlm.nih.gov/articles/PMC8135661/


    ---

