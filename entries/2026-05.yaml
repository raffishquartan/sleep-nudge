    rebound. The biological consequence is straightforward: a chronically truncated
    night, especially shift-work-pattern truncation, leaves the mucosal interface
    with a lower IgA tonic baseline at exactly the times of day when respiratory and
    oral pathogens are most likely to land.


    Plain language: a normal, on-time night is when your saliva and gut linings reload
