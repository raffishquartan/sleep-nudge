  subject: '[Cld] Sleep Nudge - 2026-05-08 - hormonal: Renin-angiotensin-aldosterone
    system rhythmicity across the sleep period'
  body: 'Plasma aldosterone is one of the more steeply rhythmic hormones in the body,
    and the rhythm is endogenously driven, not a passive consequence of being asleep.
    In a 26-participant forced-desynchrony protocol that decouples sleep, posture,
    and feeding from internal circadian time, plasma aldosterone roughly doubled across
    the biological night - peak 101 pg/ml at circadian phase ~165 degrees (~8 AM)
    versus trough 57 pg/ml at ~midnight, P < 0.001 for the circadian effect (Thosar
    et al. 2018). Crucially, sleep inactivity and wake inactivity produced statistically
    indistinguishable rises (P = 0.24), so the morning aldosterone surge is driven
    by the suprachiasmatic nucleus plus the activity/posture changes of waking up,
    not by being asleep per se. The downstream consequences are real: aldosterone
    primes sodium retention and vascular tone for the morning rise in blood pressure,
    and a flattened or phase-shifted profile is one signature of nondipping hypertension
    and worse cardiovascular outcomes.


    Plain language: your kidneys and vasculature are pre-loaded for the morning before
    you wake up, on a clock you cannot consciously reach. Sleeping at the wrong phase
    against this clock - shift work, chronic late onset - leaves the rhythm out of
    register with daytime demands. Going to bed at a stable, biologically-aligned
    time helps your morning blood pressure land where it should.


    References

    Thosar, S.S., Rueda, J.F., Berman, A.M., et al. (2018). Separate and interacting
    effects of the endogenous circadian system and behaviors on plasma aldosterone
    in humans. American Journal of Physiology - Regulatory, Integrative and Comparative
    Physiology, 316(2), R157-R164. https://pmc.ncbi.nlm.nih.gov/articles/PMC6397357/


    ---

    '
  references:
  - url: https://pmc.ncbi.nlm.nih.gov/articles/PMC6397357/
    title: Separate and interacting effects of the endogenous circadian system and
      behaviors on plasma aldosterone in humans
    authors: Thosar SS, Rueda JF, Berman AM, et al.
    year: 2018
    published_at: 2018-12
