name: Send Today

on:
  # Uncomment the schedule block below to enable daily emails.
  # Set the cron to your preferred UTC time (example: 20:30 UTC daily).
  # After uncommenting, commit and push this file to your repository.
  # schedule:
  #   - cron: "30 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: send-today
  cancel-in-progress: false

jobs:
  send-today:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - run: python -m scripts.send_today
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_ADDRESS: ${{ secrets.RECIPIENT_ADDRESS }}
