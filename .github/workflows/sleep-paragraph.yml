name: Sleep Paragraph

on:
  schedule:
    - cron: "0 22 * * *"  # 22:00 UTC daily
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: write

jobs:
  send-paragraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python -m scripts.send_sleep_paragraph
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_ADDRESS: ${{ secrets.RECIPIENT_ADDRESS }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}

      - name: Commit updated state.json
        run: |
          set -e
          if git diff --quiet -- data/state.json; then
            echo "No state change; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "chore: update sleep-nudge state.json [skip ci]"
          git push
